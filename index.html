<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>极乐集团重复昵称生成网站</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080d;
      --panel: rgba(22, 24, 35, 0.75);
      --panel-border: rgba(120, 90, 255, 0.18);
      --text: #f0f2f8;
      --muted: #9aa3b8;
      --line: rgba(70, 78, 102, 0.6);
      --accent: #8b5cff;
      --accent-strong: #a78bff;
      --accent-glow: rgba(139, 92, 255, 0.55);
      --accent-soft: rgba(139, 92, 255, 0.12);
      --gold: #e9b452;
      --danger: #ff5252;
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.35);
      --shadow-glow: 0 12px 40px rgba(139, 92, 255, 0.25);
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    /* 动态光晕背景 */
    body {
      margin: 0;
      min-height: 100vh;
      background: #07080d;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      width: 520px;
      height: 520px;
      top: -120px;
      left: -100px;
      background: rgba(139, 92, 255, 0.35);
      animation: floatLight 18s ease-in-out infinite alternate;
    }

    body::after {
      width: 620px;
      height: 620px;
      bottom: -180px;
      right: -140px;
      background: rgba(233, 180, 82, 0.18);
      animation: floatLight 22s ease-in-out infinite alternate-reverse;
    }

    @keyframes floatLight {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(60px, 40px) scale(1.1); }
      100% { transform: translate(-40px, 60px) scale(0.95); }
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 40px;
      position: relative;
      z-index: 1;
    }

    .app-shell {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(320px, 1.05fr);
      gap: 24px;
      align-items: start;
    }

    .generator,
    .result-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .generator:hover,
    .result-panel:hover {
      border-color: rgba(167, 139, 255, 0.3);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }

    .generator {
      padding: 32px 28px;
      position: sticky;
      top: 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 16px;
      color: var(--accent-strong);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--gold);
      box-shadow: 0 0 10px rgba(233, 180, 82, 0.7);
      animation: breathe 2.4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 4.8vw, 52px);
      line-height: 1.08;
      letter-spacing: 0;
      background: linear-gradient(135deg, #ffffff 0%, #b8a4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lead {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .counter {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    input {
      width: 100%;
      min-height: 56px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(15, 17, 26, 0.8);
      color: var(--text);
      font: inherit;
      font-size: 18px;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft), 0 0 20px rgba(139, 92, 255, 0.15);
      background: rgba(15, 17, 26, 1);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 10px;
      min-height: 48px;
      padding: 0 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .primary {
      background: linear-gradient(135deg, #7b42f5 0%, #9668ff 100%);
      color: #fff;
      box-shadow: 0 10px 28px rgba(139, 92, 255, 0.3);
    }

    .primary:hover:not(:disabled) {
      box-shadow: 0 14px 36px rgba(139, 92, 255, 0.45);
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .copy-btn {
      background: var(--accent-soft);
      color: var(--accent-strong);
      border: 1px solid transparent;
    }

    .copy-btn:hover {
      background: rgba(139, 92, 255, 0.2);
      border-color: rgba(167, 139, 255, 0.4);
      transform: translateY(-1px);
    }

    .primary:disabled {
      background: linear-gradient(135deg, #3a3650 0%, #454060 100%);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
      filter: none;
    }

    .hint {
      min-height: 24px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      transition: color 0.2s ease;
    }

    .hint.warning {
      color: var(--danger);
      font-weight: 700;
    }

    .safety-notice {
      margin: 14px 0 0;
      padding: 14px 16px;
      border: 1px solid rgba(233, 180, 82, 0.25);
      border-radius: 10px;
      background: rgba(233, 180, 82, 0.08);
      color: #e9c98a;
      font-size: 14px;
      line-height: 1.65;
    }

    .result-panel h2 {
      margin: 0;
      font-size: 18px;
    }

    .result-panel {
      padding: 24px;
      min-height: 640px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .status-pill {
      flex: 0 0 auto;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 800;
      border: 1px solid rgba(167, 139, 255, 0.2);
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 488px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: rgba(12, 14, 20, 0.5);
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
      padding: 32px;
      transition: all 0.3s ease;
    }

    .results {
      display: grid;
      gap: 12px;
    }

    .result-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(15, 17, 26, 0.7);
      backdrop-filter: blur(12px);
      animation: slideUp 0.45s cubic-bezier(0.4, 0, 0.2, 1) backwards;
      transition: all 0.25s ease;
    }

    .result-card:nth-child(1) { animation-delay: 0.05s; }
    .result-card:nth-child(2) { animation-delay: 0.1s; }
    .result-card:nth-child(3) { animation-delay: 0.15s; }
    .result-card:nth-child(4) { animation-delay: 0.2s; }
    .result-card:nth-child(5) { animation-delay: 0.25s; }
    .result-card:nth-child(6) { animation-delay: 0.3s; }
    .result-card:nth-child(7) { animation-delay: 0.35s; }
    .result-card:nth-child(8) { animation-delay: 0.4s; }
    .result-card:nth-child(9) { animation-delay: 0.45s; }
    .result-card:nth-child(10) { animation-delay: 0.5s; }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-card:hover {
      border-color: rgba(167, 139, 255, 0.4);
      box-shadow: 0 8px 24px rgba(139, 92, 255, 0.18);
      transform: translateY(-2px);
      background: rgba(20, 22, 34, 0.9);
    }

    .variant-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      border: 1px solid rgba(167, 139, 255, 0.15);
    }

    .preview {
      display: flex;
      align-items: center;
      min-height: 44px;
      max-width: 100%;
      padding: 0 12px;
      border-radius: 8px;
      background: rgba(22, 24, 35, 0.8);
      color: var(--text);
      font-size: 22px;
      font-weight: 900;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .copy-btn {
      min-width: 90px;
    }

    .copy-btn.done {
      background: var(--accent-strong);
      color: #fff;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 20px;
      border-radius: 10px;
      background: rgba(20, 22, 34, 0.95);
      border: 1px solid rgba(167, 139, 255, 0.3);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .copy-panel {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .copy-panel-box {
      width: min(440px, 100%);
      padding: 24px;
      border-radius: 12px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(24px);
      animation: popIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .copy-panel-box h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .copy-panel-box p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .copy-manual-text {
      width: 100%;
      min-height: 86px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--text);
      background: rgba(15, 17, 26, 0.8);
      font: inherit;
      font-size: 20px;
      font-weight: 900;
      outline: none;
    }

    .copy-panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .secondary {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .secondary:hover {
      background: rgba(139, 92, 255, 0.2);
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px max(16px, calc((100vw - 1120px) / 2));
      border-bottom: 1px solid rgba(42, 48, 64, 0.8);
      background: rgba(12, 14, 20, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
    }

    .site-nav::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139, 92, 255, 0.6), transparent);
    }

    .site-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 900;
      font-size: 20px;
    }

    .site-brand-mark {
      display: block;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 6px 16px rgba(139, 92, 255, 0.3);
    }

    .site-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .site-link {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      transition: all 0.2s ease;
    }

    .site-link:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    .site-link.active {
      background: linear-gradient(135deg, #7b42f5 0%, #9668ff 100%);
      color: #fff;
      box-shadow: 0 6px 18px rgba(139, 92, 255, 0.3);
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 24px, 640px);
        padding-top: 22px;
      }
      .site-nav {
        grid-template-columns: 1fr;
        display: grid;
        align-items: stretch;
      }
      .site-links {
        display: grid;
        grid-template-columns: 1fr;
      }
      .site-link {
        justify-content: center;
      }
      .app-shell {
        grid-template-columns: 1fr;
      }
      .generator {
        position: static;
        padding: 24px 20px;
      }
      .result-panel {
        min-height: auto;
        padding: 20px;
      }
      .empty {
        min-height: 260px;
      }
    }

    @media (max-width: 520px) {
      .actions,
      .result-card {
        grid-template-columns: 1fr;
      }
      .copy-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="site-nav">
    <a class="site-brand" href="#generator" aria-label="极乐集团首页">
      <img class="site-brand-mark" src="https://i.ibb.co/RktQYbsy/IMG-1080.png" alt="极乐帝国团徽">
      <span>极乐集团</span>
    </a>
    <nav class="site-links" aria-label="主菜单">
      <a class="site-link active" href="#generator" data-site-page-link="generator">重复昵称生成工具</a>
    </nav>
  </header>
  <main>
    <section class="app-shell" aria-label="极乐集团重复昵称生成工具">
      <div>
        <div class="generator">
          <div class="eyebrow">
            <span class="dot"></span>
            <span>极乐集团专用工具</span>
          </div>
          <h1>重复昵称生成系统</h1>
          <p class="lead">自动生成带隐形空白字符的同名方案，解决游戏昵称重复占用问题，一键复制直接使用。</p>
          <div class="input-row">
            <label for="nickname">
              <span>自定义昵称</span>
              <span class="counter" id="counter">0/10</span>
            </label>
            <input id="nickname" type="text" inputmode="text" autocomplete="off" placeholder="输入你想要的游戏昵称" aria-describedby="hint safetyNotice" autofocus>
          </div>
          <div class="actions">
            <button class="primary" id="generateBtn" type="button" disabled>批量生成同名方案</button>
          </div>
          <p class="hint" id="hint">昵称总长度上限10单位，汉字占2单位，字母数字占1单位。</p>
          <p class="safety-notice" id="safetyNotice">本工具仅供正常娱乐使用，请勿生成违规、敏感昵称，否则账号会被平台处罚，请遵守相关规范。</p>
        </div>
      </div>
      <div class="result-panel">
        <div class="panel-head">
          <h2>生成结果列表</h2>
          <span class="status-pill" id="resultCount">等待生成</span>
        </div>
        <div class="empty" id="emptyState">
          <div>
            <strong>暂无生成数据</strong><br>
            输入目标昵称后点击生成按钮，将自动产出10组可复制同名昵称。
          </div>
        </div>
        <div class="results" id="results" hidden></div>
      </div>
    </section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite">复制成功</div>
  <div class="copy-panel" id="copyPanel" role="dialog" aria-modal="true" aria-labelledby="copyPanelTitle" hidden>
    <div class="copy-panel-box">
      <h2 id="copyPanelTitle">手动复制昵称</h2>
      <p>当前浏览器权限限制无法一键复制，文本已自动全选，长按复制即可。</p>
      <textarea class="copy-manual-text" id="copyManualText" readonly></textarea>
      <div class="copy-panel-actions">
        <button class="secondary" id="selectManualCopy" type="button">全选文本</button>
        <button id="closeCopyPanel" type="button">关闭窗口</button>
      </div>
    </div>
  </div>
  <script src="tracker.js" defer></script>
  <script>
    const generatorPage = document.querySelector(".app-shell");
    const sitePageLinks = document.querySelectorAll("[data-site-page-link]");
    function setSitePage() {
      const pageName = "generator";
      generatorPage.hidden = false;
      sitePageLinks.forEach(link => {
        link.classList.toggle("active", link.dataset.sitePageLink === pageName);
      });
      window.requestAnimationFrame(() => {
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
      });
    }
    window.addEventListener("hashchange", setSitePage);
    setSitePage();
    const maxNameUnits = 10;
    const maxGeneratedUnits = 12;
    const blankUnits = 2;
    const blankSymbols = ["\u200B"];
    const maxVariantCount = 10;
    const maxVariantPoolSize = 600;
    const invisiblePattern = /[\u200B-\u200D\u2060-\u2064\uFEFF]/g;
    const forbiddenInputPattern = /[\s\u00A0]+/g;
    const generateCooldownMs = 2000;
    const rateLimitWindowMs = 60000;
    const maxGenerationsPerWindow = 12;
    const rateLimitStorageKey = "game-id-generator-attempts";
    const defaultGenerateButtonText = "批量生成同名方案";
    const nicknameInput = document.querySelector("#nickname");
    const counter = document.querySelector("#counter");
    const hint = document.querySelector("#hint");
    const generateBtn = document.querySelector("#generateBtn");
    const emptyState = document.querySelector("#emptyState");
    const results = document.querySelector("#results");
    const resultCount = document.querySelector("#resultCount");
    const toast = document.querySelector("#toast");
    const copyPanel = document.querySelector("#copyPanel");
    const copyManualText = document.querySelector("#copyManualText");
    const selectManualCopy = document.querySelector("#selectManualCopy");
    const closeCopyPanel = document.querySelector("#closeCopyPanel");
    let toastTimer;
    let lengthHintTimer;
    let generateLockTimer;
    let nextGenerateAt = 0;
    let isComposing = false;
    const segmenter = "Segmenter" in Intl
      ? new Intl.Segmenter("zh-CN", { granularity: "grapheme" })
      : null;
    function splitVisibleChars(value) {
      const cleanValue = value.replace(invisiblePattern, "");
      if (segmenter) {
        return Array.from(segmenter.segment(cleanValue), part => part.segment);
      }
      return Array.from(cleanValue);
    }
    function cleanInputValue(value) {
      return value.replace(forbiddenInputPattern, "");
    }
    function countCharUnits(char) {
      return /^[\x00-\x7F]$/.test(char) ? 1 : 2;
    }
    function countNameUnits(value) {
      return splitVisibleChars(value).reduce((total, char) => total + countCharUnits(char), 0);
    }
    function countGeneratedUnits(value) {
      const visibleUnits = countNameUnits(value);
      const blankCount = (value.match(invisiblePattern) || []).length;
      return visibleUnits + blankCount * blankUnits;
    }
    function normalizeInput(value) {
      const chars = splitVisibleChars(cleanInputValue(value));
      const units = chars.reduce((total, char) => total + countCharUnits(char), 0);
      return {
        value: chars.join(""),
        isTooLong: units > maxNameUnits,
        units
      };
    }
    function setHint(message, isWarning = false) {
      hint.textContent = message;
      hint.classList.toggle("warning", isWarning);
    }
    function showLengthWarning() {
      setHint("昵称总长度上限10单位，汉字占2单位，字母数字占1单位。", true);
    }
    function getRecentGenerateTimes() {
      const now = Date.now();
      try {
        const storedTimes = JSON.parse(localStorage.getItem(rateLimitStorageKey) || "[]");
        if (!Array.isArray(storedTimes)) {
          return [];
        }
        return storedTimes.filter(time => typeof time === "number" && now - time < rateLimitWindowMs);
      } catch (error) {
        return [];
      }
    }
    function saveGenerateTimes(times) {
      try {
        localStorage.setItem(rateLimitStorageKey, JSON.stringify(times));
      } catch (error) {
        return;
      }
    }
    function getRateLimitWaitMs() {
      const now = Date.now();
      const recentTimes = getRecentGenerateTimes();
      saveGenerateTimes(recentTimes);
      if (recentTimes.length < maxGenerationsPerWindow) {
        return 0;
      }
      return Math.max(0, rateLimitWindowMs - (now - recentTimes[0]));
    }
    function getGenerateWaitMs() {
      return Math.max(0, nextGenerateAt - Date.now(), getRateLimitWaitMs());
    }
    function formatWaitSeconds(ms) {
      return Math.max(1, Math.ceil(ms / 1000));
    }
    function updateGenerateButtonState(normalized = normalizeInput(nicknameInput.value)) {
      clearTimeout(generateLockTimer);
      const isInputInvalid = normalized.units === 0 || normalized.isTooLong;
      const waitMs = getGenerateWaitMs();
      if (!isInputInvalid && waitMs > 0) {
        generateBtn.disabled = true;
        generateBtn.textContent = `${formatWaitSeconds(waitMs)} 秒后可再次生成`;
        generateLockTimer = setTimeout(() => updateInputState(), Math.min(waitMs, 1000));
        return;
      }
      generateBtn.disabled = isInputInvalid;
      generateBtn.textContent = defaultGenerateButtonText;
    }
    function recordGenerateAttempt() {
      const now = Date.now();
      const recentTimes = getRecentGenerateTimes();
      recentTimes.push(now);
      saveGenerateTimes(recentTimes);
      nextGenerateAt = now + generateCooldownMs;
      updateGenerateButtonState();
    }
    function updateInputState() {
      clearTimeout(lengthHintTimer);
      if (!isComposing) {
        const cleanedValue = cleanInputValue(nicknameInput.value);
        if (nicknameInput.value !== cleanedValue) {
          nicknameInput.value = cleanedValue;
        }
      }
      const normalized = normalizeInput(nicknameInput.value);
      const units = normalized.units;
      counter.textContent = `${units}/${maxNameUnits}`;
      updateGenerateButtonState(normalized);
      if (normalized.isTooLong && !isComposing) {
        setHint("昵称总长度上限10单位，汉字占2单位，字母数字占1单位。");
        lengthHintTimer = setTimeout(() => {
          const latest = normalizeInput(nicknameInput.value);
          if (latest.isTooLong && !isComposing) {
            showLengthWarning();
          }
        }, 700);
      } else {
        setHint("昵称总长度上限10单位，汉字占2单位，字母数字占1单位。");
      }
    }
    function buildNameWithBlanks(chars, slotBlanks) {
      let output = "";
      chars.forEach((char, index) => {
        output += (slotBlanks[index] || "") + char;
      });
      output += slotBlanks[chars.length] || "";
      return output;
    }
    function getInsertionOrder(slotCount) {
      const last = slotCount - 1;
      const preferred = [0, last, Math.ceil(last / 2), 1, Math.max(0, last - 1), Math.floor(last / 2)];
      const allSlots = Array.from({ length: slotCount }, (_, index) => index);
      return [...new Set([...preferred, ...allSlots])].filter(index => index >= 0 && index < slotCount);
    }
    function randomInt(max) {
      if (max <= 0) {
        return 0;
      }
      if (window.crypto && window.crypto.getRandomValues) {
        const value = new Uint32Array(1);
        window.crypto.getRandomValues(value);
        return value[0] % max;
      }
      return Math.floor(Math.random() * max);
    }
    function shuffleItems(items) {
      const shuffled = [...items];
      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const swapIndex = randomInt(index + 1);
        [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
      }
      return shuffled;
    }
    function createEmptySlotBlanks(slotCount) {
      return Array.from({ length: slotCount }, () => "");
    }
    function makeVariants(name) {
      const chars = splitVisibleChars(name);
      const nameUnits = countNameUnits(name);
      const maxBlankCount = Math.max(1, Math.floor((maxGeneratedUnits - nameUnits) / blankUnits));
      const slotCount = chars.length + 1;
      const positions = getInsertionOrder(slotCount);
      const variants = [];
      const seen = new Set();
      function addVariant(slotBlanks) {
        if (variants.length >= maxVariantPoolSize) {
          return;
        }
        const value = buildNameWithBlanks(chars, slotBlanks);
        if (seen.has(value) || countGeneratedUnits(value) > maxGeneratedUnits || splitVisibleChars(value).join("") !== name) {
          return;
        }
        seen.add(value);
        variants.push({ value });
      }
      positions.forEach(position => {
        blankSymbols.forEach(symbol => {
          for (let blankCount = 1; blankCount <= maxBlankCount; blankCount += 1) {
            const slotBlanks = createEmptySlotBlanks(slotCount);
            slotBlanks[position] = symbol.repeat(blankCount);
            addVariant(slotBlanks);
          }
        });
      });
      for (let blankCount = 2; blankCount <= maxBlankCount && variants.length < maxVariantPoolSize; blankCount += 1) {
        positions.forEach((firstPosition, firstIndex) => {
          positions.slice(firstIndex + 1).forEach(secondPosition => {
            blankSymbols.forEach(firstSymbol => {
              blankSymbols.forEach(secondSymbol => {
                const slotBlanks = createEmptySlotBlanks(slotCount);
                slotBlanks[firstPosition] = firstSymbol;
                slotBlanks[secondPosition] = secondSymbol.repeat(blankCount - 1);
                addVariant(slotBlanks);
              });
            });
          });
        });
      }
      let attempts = 0;
      const maxAttempts = maxVariantPoolSize * 12;
      while (variants.length < maxVariantPoolSize && attempts < maxAttempts) {
        attempts += 1;
        const slotBlanks = createEmptySlotBlanks(slotCount);
        const blankCount = 1 + randomInt(maxBlankCount);
        for (let index = 0; index < blankCount; index += 1) {
          const position = positions[randomInt(positions.length)];
          slotBlanks[position] += blankSymbols[randomInt(blankSymbols.length)];
        }
        addVariant(slotBlanks);
      }
      return shuffleItems(variants).slice(0, maxVariantCount);
    }
    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }
    function selectCopyField(field) {
      field.focus({ preventScroll: true });
      field.select();
      if (field.setSelectionRange) {
        field.setSelectionRange(0, field.value.length);
      }
    }
    async function writeClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.top = "0";
      textarea.style.left = "0";
      textarea.style.width = "1px";
      textarea.style.height = "1px";
      textarea.style.padding = "0";
      textarea.style.border = "0";
      textarea.style.opacity = "0";
      textarea.style.fontSize = "16px";
      document.body.appendChild(textarea);
      selectCopyField(textarea);
      const copied = document.execCommand("copy");
      textarea.remove();
      if (!copied) {
        throw new Error("copy_blocked");
      }
      return true;
    }
    function showManualCopy(text) {
      copyManualText.value = text;
      copyPanel.hidden = false;
      window.requestAnimationFrame(() => {
        selectCopyField(copyManualText);
      });
      showToast("请长按选中内容手动复制");
    }
    function markCopyDone(button) {
      document.querySelectorAll(".copy-btn.done").forEach(item => {
        item.classList.remove("done");
        item.textContent = "复制";
      });
      button.classList.add("done");
      button.textContent = "已复制";
    }
    async function copyText(text, button) {
      try {
        await writeClipboard(text);
        markCopyDone(button);
        showToast("复制完成，直接粘贴使用");
      } catch (error) {
        showManualCopy(text);
      }
    }
    function renderResults() {
      const normalized = normalizeInput(nicknameInput.value);
      const name = normalized.value;
      if (!name) {
        updateInputState();
        nicknameInput.focus();
        return;
      }
      if (normalized.isTooLong) {
        clearTimeout(lengthHintTimer);
        showLengthWarning();
        nicknameInput.focus();
        showToast("昵称超出长度限制，请缩短文字");
        return;
      }
      const waitMs = getGenerateWaitMs();
      if (waitMs > 0) {
        updateGenerateButtonState(normalized);
        showToast(`${formatWaitSeconds(waitMs)}秒冷却中，请稍后再生成`);
        return;
      }
      const variants = makeVariants(name);
      results.innerHTML = "";
      variants.forEach((variant, index) => {
        const card = document.createElement("article");
        card.className = "result-card";
        const info = document.createElement("div");
        const meta = document.createElement("div");
        meta.className = "variant-meta";
        meta.innerHTML = `<span class="tag">方案 ${index + 1}</span>`;
        const preview = document.createElement("div");
        preview.className = "preview";
        preview.textContent = variant.value;
        preview.title = "带隐形空白字符，游戏内显示完全同名";
        info.append(meta, preview);
        const copyButton = document.createElement("button");
        copyButton.className = "copy-btn";
        copyButton.type = "button";
        copyButton.textContent = "复制";
        copyButton.addEventListener("click", () => copyText(variant.value, copyButton));
        card.append(info, copyButton);
        results.appendChild(card);
      });
      emptyState.hidden = true;
      results.hidden = false;
      resultCount.textContent = `已生成 ${variants.length} 组`;
      recordGenerateAttempt();
      showToast(`成功生成${variants.length}组同名昵称`);
    }
    nicknameInput.addEventListener("compositionstart", () => {
      isComposing = true;
      updateInputState();
    });
    nicknameInput.addEventListener("compositionend", () => {
      isComposing = false;
      updateInputState();
    });
    nicknameInput.addEventListener("input", updateInputState);
    nicknameInput.addEventListener("blur", () => {
      const latest = normalizeInput(nicknameInput.value);
      if (latest.isTooLong && !isComposing) {
        clearTimeout(lengthHintTimer);
        showLengthWarning();
      }
    });
    nicknameInput.addEventListener("keydown", event => {
      if (event.key === "Enter" && !generateBtn.disabled) {
        renderResults();
      }
    });
    generateBtn.addEventListener("click", renderResults);
    selectManualCopy.addEventListener("click", () => {
      selectCopyField(copyManualText);
      showToast("文本已全选，长按复制");
    });
    closeCopyPanel.addEventListener("click", () => {
      copyPanel.hidden = true;
    });
    copyPanel.addEventListener("click", event => {
      if (event.target === copyPanel) {
        copyPanel.hidden = true;
      }
    });
    updateInputState();
  </script>
</body>
</html>
